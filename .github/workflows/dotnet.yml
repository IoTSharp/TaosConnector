# This workflow builds, tests, and releases the TaosConnector library

name: CI/CD

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore EFCore.Taos.sln

    - name: Build
      run: dotnet build -c Release --no-restore EFCore.Taos.sln

    - name: Run unit tests (no TDengine required)
      run: dotnet test -c Release --no-build --no-restore --filter "FullyQualifiedName~StatementObjectTest|FullyQualifiedName~TestRemove|FullyQualifiedName~SqModelTest" src/Taos.Ado.Tests/Taos.Ado.Tests.csproj --logger trx

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: "**/*.trx"

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore EFCore.Taos.sln

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Pack NuGet packages
      run: |
        dotnet pack src/IoTSharp.Data.Taos/IoTSharp.Data.Taos.csproj \
          -c Release \
          --no-restore \
          -p:Version=${{ steps.version.outputs.VERSION }} \
          -o ./nupkg

    - name: Publish to NuGet
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./nupkg/*.nupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
